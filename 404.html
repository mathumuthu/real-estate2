<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Oops!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    color:#fff;
    padding:20px;
}

.container{
    text-align:center;
    max-width:600px;
    width:100%;
}

.error-code{
    font-size:10rem;
    font-weight:800;
    line-height:1;
    color:#38bdf8;
    text-shadow:0 0 25px rgba(56,189,248,.4);
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

.title{
    font-size:2rem;
    margin-top:15px;
    margin-bottom:10px;
}

.description{
    color:#cbd5e1;
    line-height:1.7;
    margin-bottom:30px;
}

.btn-group{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 28px;
    border-radius:50px;
    font-weight:600;
    transition:.3s;
}

.home{
    background:#38bdf8;
    color:#0f172a;
}

.home:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(56,189,248,.3);
}

.back{
    border:2px solid #38bdf8;
    color:#38bdf8;
    background:transparent;
    cursor:pointer;
}

.back:hover{
    background:#38bdf8;
    color:#0f172a;
}

.circle{
    position:fixed;
    border-radius:50%;
    background:rgba(56,189,248,.08);
    z-index:-1;
}

.circle1{
    width:250px;
    height:250px;
    top:-80px;
    left:-80px;
}

.circle2{
    width:300px;
    height:300px;
    bottom:-100px;
    right:-100px;
}

@media(max-width:768px){
    .error-code{
        font-size:7rem;
    }

    .title{
        font-size:1.6rem;
    }

    .btn{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container">

    <div class="error-code">404</div>

    <h1 class="title">Oops! Lost in Space</h1>

    <p class="description">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
    </p>

    <div class="btn-group">
        <a href="index.html" class="btn home">🏠 Back to Home</a>

        <button class="btn back" onclick="window.history.back()">
            ← Previous Page
        </button>
    </div>

</div>

</body>
</html>
