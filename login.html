<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Estate Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('home4 img.webp');
background-size:cover;
background-position:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
color:#fff;
}

h2{
text-align:center;
margin-bottom:20px;
color:#f8d56b;
}

.form{
display:none;
}

.form.active{
display:block;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#f8d56b;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ffd84d;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
color:#f8d56b;
text-decoration:none;
margin:0 5px;
font-size:14px;
}

.logo{
text-align:center;
font-size:28px;
margin-bottom:15px;
font-weight:bold;
color:#f8d56b;
}

@media(max-width:480px){
.container{
padding:20px;
}
}
</style>
</head>
<body>

<div class="container">

 <div class="logo"><img src="logoo.webp" width="35px" height="35px" alt="Stackly Logo"> STACKLY</div>

<!-- LOGIN -->
<div class="form active" id="loginForm">
<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>

<div class="links">
<a href="#" onclick="showForm('signupForm')">Sign Up</a> |
<a href="#" onclick="showForm('forgotForm')">Forgot Password?</a>
</div>
</div>

<!-- SIGNUP -->
<div class="form" id="signupForm">
<h2>Sign Up</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password">

<button onclick="signup()">Create Account</button>

<div class="links">
<a href="#" onclick="showForm('loginForm')">Back Login</a>
</div>
</div>

<!-- FORGOT -->
<div class="form" id="forgotForm">
<h2>Forgot Password</h2>

<input type="email" id="forgotEmail" placeholder="Enter Email">

<button onclick="forgotPassword()">Reset Password</button>

<div class="links">
<a href="#" onclick="showForm('loginForm')">Back Login</a>
</div>
</div>

</div>

<script>

function showForm(formId){
document.querySelectorAll('.form').forEach(form=>{
form.classList.remove('active');
});

document.getElementById(formId).classList.add('active');
}

function login(){

let email=document.getElementById("loginEmail").value.trim();
let password=document.getElementById("loginPassword").value.trim();

if(email==="" || password===""){
alert("⚠️ Please fill all login fields.");
return;
}

alert("✅ Login Successful!");
window.location.href="404.html";
}

function signup(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("signupEmail").value.trim();
let password=document.getElementById("signupPassword").value.trim();

if(name==="" || email==="" || password===""){
alert("⚠️ Please fill all signup fields.");
return;
}

alert("✅ Account Created Successfully!");
window.location.href="404.html";
}

function forgotPassword(){

let email=document.getElementById("forgotEmail").value.trim();

if(email===""){
alert("⚠️ Please enter your email.");
return;
}

alert("📧 Password reset link sent!");
window.location.href="404.html";
}

</script>

</body>
</html>
