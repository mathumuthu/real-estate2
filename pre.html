<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<!-- PRELOADER START -->
<div id="preloader">
    <div class="loader">
        <div class="home-icon">
            <i class="fas fa-home"></i>
        </div>
        <span class="loading-text">Loading Properties...</span>
    </div>
</div>
<!-- PRELOADER END -->
 <style>/* ===== PRELOADER ===== */

#preloader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f172a;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: 0.6s ease;
}

.loader {
    text-align: center;
}

.home-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 5px solid #1e293b;
    border-top: 5px solid #22c55e;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: spin 1.2s linear infinite;
}

.home-icon i {
    color: #22c55e;
    font-size: 30px;
}

.loading-text {
    color: #fff;
    margin-top: 15px;
    display: block;
    font-size: 16px;
}

/* Animation */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
    .home-icon{
        width:60px;
        height:60px;
    }
    .home-icon i{
        font-size:22px;
    }
}</style>
<script>
window.addEventListener("load", function(){
    const preloader = document.getElementById("preloader");
    
    preloader.style.opacity = "0";
    preloader.style.visibility = "hidden";
    
    setTimeout(()=>{
        preloader.style.display = "none";
    },600);
});
</script></script>
