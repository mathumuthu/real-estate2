<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Property Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  overflow: hidden;
}

.container {
  text-align: center;
  padding: 20px;
  max-width: 600px;
  animation: fadeIn 1.5s ease-in-out;
}

.house {
  font-size: 80px;
  animation: float 3s ease-in-out infinite;
}

h1 {
  font-size: 120px;
  font-weight: 700;
  letter-spacing: 5px;
}

h2 {
  font-weight: 400;
  margin-bottom: 20px;
  opacity: 0.9;
}

p {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 30px;
}

.btn {
  display: inline-block;
  padding: 12px 30px;
  background: #ffb400;
  color: #000;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s ease;
}

.btn:hover {
  background: #fff;
  transform: scale(1.05);
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media(max-width: 768px) {
  h1 {
    font-size: 70px;
  }
  .house {
    font-size: 60px;
  }
}

@media(max-width: 480px) {
  h1 {
    font-size: 50px;
  }
  .house {
    font-size: 45px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="house">🏠</div>
  <h1>404</h1>
  <h2>Property Not Found</h2>
  <p>Oops! The property you're looking for seems to have been sold or moved.</p>
  <a href="index.html" class="btn">Back to Homepage</a>
</div>

</body>
</html>
