<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 6rem;
            line-height: 1;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s ease;
            min-width: 140px;
        }

        .home-btn {
            background: #ffffff;
            color: #4f46e5;
        }

        .home-btn:hover {
            background: #f3f4f6;
            transform: translateY(-2px);
        }

        .back-btn {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            cursor: pointer;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 4.5rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            .btn {
                width: 100%;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>

        <p>
            Sorry, the page you are looking for might have been removed,
            renamed, or is temporarily unavailable.
        </p>

        <div class="buttons">
            <a href="index.html" class="btn home-btn">🏠 Home</a>

            <button class="btn back-btn" onclick="history.back()">
                ← Go Back
            </button>
        </div>
    </div>

</body>
</html>
